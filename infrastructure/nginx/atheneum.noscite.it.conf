server {
    if ($host = atheneum.noscite.it) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name atheneum.noscite.it learn.stefanoandrello.me;
    return 301 https://$host$request_uri;


}

server {
    listen 443 ssl;
    server_name atheneum.noscite.it learn.stefanoandrello.me;
    root /var/www/noscite-atheneum/public;
    index index.php;
    ssl_certificate /etc/letsencrypt/live/atheneum.noscite.it/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/atheneum.noscite.it/privkey.pem; # managed by Certbot

    client_max_body_size 2048M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ===== Security headers aggiuntivi (Security Fase A) =====
    # HSTS: forza HTTPS per 1 anno + preload-ready
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CSP: whitelist degli script/style/font/connect attualmente usati
    # script:  Tailwind CDN, Alpine + marked + dompurify + pusher + echo + d3 + markmap (jsdelivr), TipTap (esm.sh)
    # style:   fonts.bunny.net, jsdelivr (markmap CSS)
    # font:    fonts.bunny.net, jsdelivr, data: URI
    # img:     'self' + data: + qualsiasi https: (avatar M365, materiali corso) + blob: (canvas drawings)
    # connect: 'self' (Officina APIs) + wss://atheneum.noscite.it (Reverb) + Anthropic (se chiamata mai client-side) + esm.sh (TipTap fetch dinamici)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdn.tailwindcss.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.bunny.net https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.bunny.net https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; connect-src 'self' https://api.anthropic.com https://esm.sh wss://atheneum.noscite.it; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Referrer + Permissions Policy + XSS legacy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), interest-cohort=(), payment=(), usb=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Reverb WebSocket proxy (Fase C messaggistica real-time)
    location /app {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\.env { deny all; }

}
